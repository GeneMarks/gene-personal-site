<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th colspan="2">{{ tableTitle or 'Posts' }}</th>
            </tr>
        </thead>

        <tbody>
            {%- for post in posts -%}
                {% if postsLimit is not defined or postsLimit == -1 or loop.index0 < postsLimit %}
                    <tr>
                        <td class="text-right">
                            <time datetime="{{ post.data.created | toIsoDateTime }}">{{ post.data.created | formatPostCreatedDate }}</time>
                        </td>
                        <td class="text-left">
                            <a href="{{ post.url }}">{{ post.data.title }}</a>
                        </td>
                    </tr>
                {% endif %}
            {%- endfor -%}
        </tbody>
    </table>
</div>
